version: "3.9"

services:
  db:
    image: postgres:16
    container_name: loglens-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: loglens
      POSTGRES_PASSWORD: loglens
      POSTGRES_DB: loglens

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: loglens-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

volumes:
  postgres_data: