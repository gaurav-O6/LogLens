services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: loglens-backend

    command: >
      gunicorn
      --workers 4
      --bind 0.0.0.0:5000
      --timeout 600
      run:app

    ports:
      - "5000:5000"

    volumes:
      - ./backend:/app
      - ./backend/sample_logs:/sample_logs

    env_file:
      - ./.env

    depends_on:
      - postgres
      - redis


  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker

    container_name: loglens-worker

    command: >
      rq worker
      --worker-class rq.worker.SimpleWorker
      log_processing

    volumes:
      - ./backend:/app
      - ./backend/sample_logs:/sample_logs

    env_file:
      - ./.env

    depends_on:
      - redis
      - postgres


  frontend:
    build:
      context: ./frontend

    container_name: loglens-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend


  postgres:
    image: postgres:16

    container_name: loglens-postgres

    environment:
      POSTGRES_DB: loglens
      POSTGRES_USER: loglens
      POSTGRES_PASSWORD: loglens

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7-alpine

    container_name: loglens-redis

    ports:
      - "6379:6379"


volumes:
  postgres_data: